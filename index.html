<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Speedrun Marathon Calendar</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header>
    <h1>🎮 Speedrun Marathon Calendar</h1>
    <p class="subtitle">All times shown in your local timezone&nbsp;(<span id="tz-label"></span>)</p>
  </header>

  <main>
    <div class="month-nav">
      <button id="prev-month" aria-label="Previous month">&larr;</button>
      <h2 id="month-title"></h2>
      <button id="next-month" aria-label="Next month">&rarr;</button>
    </div>

    <div class="calendar-grid" id="calendar-grid">
      <div class="day-header">Sun</div>
      <div class="day-header">Mon</div>
      <div class="day-header">Tue</div>
      <div class="day-header">Wed</div>
      <div class="day-header">Thu</div>
      <div class="day-header">Fri</div>
      <div class="day-header">Sat</div>
      <!-- day cells injected by JS -->
    </div>

    <section id="event-details" class="event-details hidden">
      <h3 id="detail-date"></h3>
      <ul id="detail-list"></ul>
    </section>

    <section class="upcoming">
      <h2>Upcoming Marathons</h2>
      <ul id="upcoming-list"></ul>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Speedrun Marathon Calendar</p>
  </footer>

  <script src="js/events.js"></script>
  <script src="js/calendar.js"></script>
</body>
</html>
